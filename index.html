<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: oklch(0.99 0.006 85);
      color: oklch(0.28 0.02 264);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    main {
      max-width: 38rem;
      width: 100%;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      color: oklch(0.28 0.02 264);
    }

    p {
      font-size: 1.35rem;
      line-height: 1.65;
      color: oklch(0.38 0.015 264);
      margin-bottom: 1rem;
    }

    p + p {
      margin-top: 0;
    }

    .contact {
      margin-top: 2.5rem;
      font-size: 1rem;
      color: oklch(0.52 0.01 264);
    }

    .contact a {
      color: oklch(0.48 0.2 264);
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 4rem;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: oklch(0.68 0.005 264);
    }
  </style>
</head>
<body>
  <main>
    <h1>Synthoria</h1>

    <p>
      Algorithms for whole-genome sequencing interpretation
      and population-scale genomic inference.
    </p>
    <p>
      Research-grade pipelines. Open methods.
    </p>

    <div class="contact">
      <a href="mailto:research@synthoria.bio">research@synthoria.bio</a>
    </div>

    <footer>© 2026 Synthoria Inc.</footer>
  </main>
</body>
</html>
